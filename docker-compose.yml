services:
  tml:
    image: tmodloader
    container_name: tml
    build:
      context: .
      args:
        TML_VERSION: ${TML_VERSION:-v2026.03.3.0}
    restart: unless-stopped
    #user: "1001:1001"
    ports:
      - "${TML_PORT:-7777}:7777"
    volumes:
      - .:/app/data
    command:
      - ./start-tModLoaderServer.sh
      - -savedirectory
      - /app/data
      - -config
      - /app/data/serverconfig.txt
    stdin_open: true
    tty: true

  backup:
    image: offen/docker-volume-backup:v2
    container_name: tml_backup
    restart: unless-stopped
    environment:
      # Every 15 min — match or slightly trail tModLoader's autosave interval
      BACKUP_CRON_EXPRESSION: "*/15 * * * *"
      BACKUP_FILENAME: "tmodloader-%Y-%m-%dT%H-%M-%S.tar.gz"
      BACKUP_LATEST_SYMLINK: "tmodloader-latest.tar.gz"
      # Keep 7 days of 15-min snapshots (~672 files). Adjust to taste.
      BACKUP_RETENTION_DAYS: "7"
      BACKUP_PRUNING_LEEWAY: "1m"
      TZ: "${TZ:-Australia/Melbourne}"
    volumes:
      - ./tModLoader/Worlds:/backup/Worlds:ro
      - ./backups:/archive
